name: Mini CI

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run tests
        run: ./mvnw test

  build:
    runs-on: ubuntu-latest
    needs: test   # 👈 clave: no se ejecuta si test falla

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build project
        run: ./mvnw package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-ci-jar
          path: target/*.jar